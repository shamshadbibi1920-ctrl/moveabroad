<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="geo.region" content="PK" />
    <meta name="geo.country" content="Pakistan" />
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MoveAbroad.pk",
      "url": "https://www.moveabroad.pk",
      "logo": "https://www.moveabroad.pk/logo.png",
      "sameAs": [
        "https://www.facebook.com/moveabroadpk",
        "https://twitter.com/moveabroadpk",
        "https://www.instagram.com/moveabroadpk"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://www.moveabroad.pk",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.moveabroad.pk/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
